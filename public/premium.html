<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premium — Kaitrux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{
      box-sizing:border-box;
      margin:0;
      padding:0
    }

    :root{
      --bg:#080810;
      --surface:#0f0f1a;
      --surface2:#141424;
      --border:rgba(255,255,255,0.07);
      --accent:#5865F2;
      --accent2:#eb459e;
      --text:#e8e8f0;
      --muted:#6b6b8a;
      --glow:rgba(88,101,242,0.35);
      --success:#57f287;
      --danger:#ed4245;
      --warning:#fee75c;
    }

    html{
      scroll-behavior:smooth
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:"DM Sans",sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none;
      z-index:0
    }

    nav{
      position:sticky;
      top:0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:1rem 2.5rem;
      background:rgba(8,8,16,0.85);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border)
    }

    .logo{
      font-family:"Syne",sans-serif;
      font-weight:800;
      font-size:1.3rem;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent
    }

    .back-btn{
      color:var(--muted);
      text-decoration:none;
      font-size:0.88rem;
      transition:color 0.2s;
      display:flex;
      align-items:center;
      gap:0.4rem
    }

    .back-btn:hover{
      color:var(--text)
    }

    main{
      position:relative;
      z-index:1;
      max-width:900px;
      margin:0 auto;
      padding:2.5rem 2rem
    }

    h1{
      font-family:"Syne",sans-serif;
      font-weight:800;
      font-size:2rem;
      letter-spacing:-0.5px;
      margin-bottom:0.4rem
    }

    .subtitle{
      color:var(--muted);
      font-size:0.95rem;
      margin-bottom:2.5rem
    }

    .status-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:1.2rem;
      margin-bottom:2rem
    }

    .status-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:1.5rem 1.8rem;
      transition:border-color 0.3s
    }

    .status-card.active{
      border-color:var(--warning);
      box-shadow:0 0 20px rgba(254,231,92,0.08)
    }

    .status-label{
      font-size:0.75rem;
      text-transform:uppercase;
      letter-spacing:0.1em;
      color:var(--muted);
      margin-bottom:0.6rem
    }

    .status-badge{
      display:inline-flex;
      align-items:center;
      gap:0.4rem;
      font-size:1rem;
      font-weight:600;
      font-family:"Syne",sans-serif
    }

    .badge-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      flex-shrink:0
    }

    .badge-dot.on{
      background:var(--warning);
      box-shadow:0 0 8px rgba(254,231,92,0.6)
    }

    .badge-dot.off{
      background:var(--muted)
    }

    .status-expiry{
      font-size:0.78rem;
      color:var(--muted);
      margin-top:0.4rem
    }

    .status-expiry span{
      color:var(--warning)
    }

    .section-title{
      font-family:"Syne",sans-serif;
      font-weight:700;
      font-size:1.1rem;
      margin-bottom:1rem;
      display:flex;
      align-items:center;
      gap:0.5rem
    }

    .perks-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:0.8rem;
      margin-bottom:2.5rem
    }

    .perk{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:1rem 1.2rem;
      display:flex;
      align-items:flex-start;
      gap:0.75rem;
      transition:border-color 0.2s
    }

    .perk:hover{
      border-color:rgba(254,231,92,0.3)
    }

    .perk-icon{
      font-size:1.3rem;
      flex-shrink:0;
      margin-top:1px
    }

    .perk-name{
      font-size:0.9rem;
      font-weight:600;
      margin-bottom:0.2rem
    }

    .perk-desc{
      font-size:0.78rem;
      color:var(--muted);
      line-height:1.4
    }

    .redeem-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:1.8rem;
      margin-bottom:2rem
    }

    .redeem-card h3{
      font-family:"Syne",sans-serif;
      font-weight:700;
      font-size:1.1rem;
      margin-bottom:0.3rem
    }

    .redeem-card p{
      color:var(--muted);
      font-size:0.85rem;
      margin-bottom:1.2rem;
      line-height:1.5
    }

    .form-row{
      display:flex;
      gap:0.75rem;
      flex-wrap:wrap
    }

    .form-group{
      display:flex;
      flex-direction:column;
      gap:0.4rem;
      flex:1;
      min-width:160px
    }

    label{
      font-size:0.78rem;
      color:var(--muted);
      letter-spacing:0.04em
    }

    input,select{
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:8px;
      padding:0.65rem 0.9rem;
      color:var(--text);
      font-family:"DM Sans",sans-serif;
      font-size:0.9rem;
      outline:none;
      transition:border-color 0.2s;
      width:100%
    }

    input:focus,select:focus{
      border-color:var(--accent)
    }

    input::placeholder{
      color:var(--muted)
    }

    select option{
      background:var(--surface2)
    }

    .btn{
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      padding:0.68rem 1.4rem;
      border-radius:10px;
      font-family:"DM Sans",sans-serif;
      font-weight:600;
      font-size:0.9rem;
      cursor:pointer;
      text-decoration:none;
      transition:all 0.25s;
      border:none;
      white-space:nowrap
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--warning),#f0a500);
      color:#000;
      box-shadow:0 0 16px rgba(254,231,92,0.25)
    }

    .btn-primary:hover:not(:disabled){
      transform:translateY(-2px);
      box-shadow:0 0 28px rgba(254,231,92,0.4)
    }

    .btn-primary:disabled{
      opacity:0.5;
      cursor:not-allowed
    }

    .toast{
      position:fixed;
      bottom:2rem;
      right:2rem;
      z-index:999;
      padding:0.85rem 1.3rem;
      border-radius:12px;
      font-size:0.88rem;
      font-weight:500;
      display:flex;
      align-items:center;
      gap:0.6rem;
      transform:translateY(100px);
      opacity:0;
      transition:all 0.3s;
      max-width:320px
    }

    .toast.show{
      transform:translateY(0);
      opacity:1
    }

    .toast.success{
      background:#0d2d1e;
      border:1px solid var(--success);
      color:var(--success)
    }

    .toast.error{
      background:#2d0d0d;
      border:1px solid var(--danger);
      color:var(--danger)
    }

    .spinner{
      width:16px;
      height:16px;
      border:2px solid rgba(0,0,0,0.2);
      border-top-color:#000;
      border-radius:50%;
      animation:spin 0.7s linear infinite
    }

    @keyframes spin{
      to{
        transform:rotate(360deg)
      }
    }

    @media(max-width:600px){
      .status-grid{
        grid-template-columns:1fr
      }

      .form-row{
        flex-direction:column
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">Kaitrux</div>
    <a href="/dashboard" class="back-btn">← Dashboard</a>
  </nav>

  <main>

    <h1>👑 Premium</h1>

    <p class="subtitle">
      Activá el premium para tu cuenta o servidor y desbloqueá funciones exclusivas.
    </p>

    <div class="status-grid">

      <div class="status-card" id="user-card">
        <div class="status-label">Tu cuenta</div>

        <div class="status-badge">
          <div class="badge-dot off" id="user-dot"></div>
          <span id="user-label">Cargando...</span>
        </div>

        <div class="status-expiry" id="user-expiry"></div>
      </div>

      <div class="status-card" id="server-card">
        <div class="status-label">Servidor actual</div>

        <div class="status-badge">
          <div class="badge-dot off" id="server-dot"></div>
          <span id="server-label">—</span>
        </div>

        <div class="status-expiry" id="server-expiry"></div>
      </div>

    </div>

  </main>

</body>
</html>
