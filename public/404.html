<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Kaitrux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080810;--surface:#0f0f1a;--border:rgba(255,255,255,0.07);
      --accent:#5865F2;--accent2:#eb459e;--text:#e8e8f0;--muted:#6b6b8a;
      --glow:rgba(88,101,242,0.35);
    }
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);color:var(--text);
      font-family:"DM Sans",sans-serif;
      min-height:100vh;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:2rem;
    }

    /* Glows de fondo */
    .bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .bg-glow-1{background:rgba(88,101,242,0.15);top:-150px;left:-150px}
    .bg-glow-2{background:rgba(235,69,158,0.10);bottom:-150px;right:-150px}

    /* Noise */
    body::before{
      content:"";position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none;z-index:0;
    }

    .container{position:relative;z-index:1;max-width:520px}

    /* Número 404 grande */
    .error-code{
      font-family:"Syne",sans-serif;font-weight:800;
      font-size:clamp(6rem,20vw,10rem);line-height:1;
      letter-spacing:-4px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      animation:fadeUp 0.5s ease both;
      user-select:none;
    }

    /* Gato pixelado ASCII */
    .ascii-cat{
      font-family:"DM Mono","Fira Code",monospace;
      font-size:0.75rem;line-height:1.4;
      color:var(--muted);
      margin:1rem 0;
      animation:fadeUp 0.5s 0.05s ease both;
      white-space:pre;
    }

    h1{
      font-family:"Syne",sans-serif;font-weight:800;
      font-size:clamp(1.4rem,4vw,2rem);
      margin-bottom:0.75rem;
      animation:fadeUp 0.5s 0.1s ease both;
    }
    p{
      color:var(--muted);font-size:1rem;line-height:1.6;
      margin-bottom:2rem;
      animation:fadeUp 0.5s 0.15s ease both;
    }

    .actions{
      display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;
      animation:fadeUp 0.5s 0.2s ease both;
    }

    .btn{
      display:inline-flex;align-items:center;gap:0.5rem;
      padding:0.7rem 1.5rem;border-radius:10px;
      font-family:"DM Sans",sans-serif;font-weight:600;font-size:0.9rem;
      cursor:pointer;text-decoration:none;
      transition:all 0.25s;border:none;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--accent),#7b68ee);color:#fff;
      box-shadow:0 0 20px var(--glow),0 4px 15px rgba(88,101,242,0.4);
      border:1px solid rgba(255,255,255,0.1);
    }
    .btn-primary:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 0 35px rgba(88,101,242,0.7),0 8px 25px rgba(88,101,242,0.5);
    }
    .btn-ghost{
      background:rgba(255,255,255,0.03);color:var(--text);
      border:1px solid var(--border);
    }
    .btn-ghost:hover{
      background:rgba(255,255,255,0.06);border-color:rgba(88,101,242,0.5);
      transform:translateY(-2px);
    }

    /* Partículas flotantes */
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .particle{
      position:absolute;border-radius:50%;
      animation:float linear infinite;
      opacity:0;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes float{
      0%  {transform:translateY(100vh) rotate(0deg);opacity:0}
      10% {opacity:0.6}
      90% {opacity:0.3}
      100%{transform:translateY(-10vh) rotate(720deg);opacity:0}
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="error-code">404</div>

    <pre class="ascii-cat">
 /\_____/\
(  o   o  )
(  =^.^=  )   miau?
 (  ---  )
  (     )
   )   (
  (_)-(_)</pre>

    <h1>Esta página no existe</h1>
    <p>El gato buscó por todos lados y no encontró nada.<br>Puede que la URL sea incorrecta o la página se haya ido de paseo.</p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        🏠 Volver al inicio
      </a>
      <a href="/commands" class="btn btn-ghost">
        📋 Ver comandos
      </a>
      <a href="/dashboard" class="btn btn-ghost">
        ⚙️ Dashboard
      </a>
    </div>
  </div>

  <script>
    // Partículas flotantes
    const container = document.getElementById('particles');
    const colors = ['#5865F2','#eb459e','#57f287','#fee75c','#ed4245'];

    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 3;
      p.style.cssText = [
        `width:${size}px`,
        `height:${size}px`,
        `left:${Math.random() * 100}%`,
        `background:${colors[Math.floor(Math.random() * colors.length)]}`,
        `animation-duration:${Math.random() * 12 + 8}s`,
        `animation-delay:${Math.random() * 10}s`,
        `filter:blur(${size > 7 ? 1 : 0}px)`,
      ].join(';');
      container.appendChild(p);
    }
  </script>
</body>
</html>
