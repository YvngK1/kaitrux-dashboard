<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #141424;
    --border: rgba(255,255,255,0.07);
    --accent: #5865F2;
    --accent2: #eb459e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --glow: rgba(88,101,242,0.35);
    --success: #57f287;
    --danger: #ed4245;
    --warning: #fee75c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }

  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }

  .nav-btn {
    background: var(--accent);
    color: #fff;
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    font-weight: 500;
    font-size: 0.9rem;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 0 0 rgba(88,101,242,0);
  }
  .nav-btn:hover {
    background: #4752c4;
    box-shadow: 0 0 16px var(--glow);
    transform: translateY(-1px);
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 4rem 2rem 2rem;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3rem);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 2rem;
  }

  /* SEARCH */
  .search-wrap {
    max-width: 480px;
    margin: 0 auto 1rem;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px 12px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* MAIN */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  .prefix-note {
    background: rgba(88,101,242,0.08);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .prefix-note strong { color: var(--text); }

  /* CATS */
  .cats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .cat-btn {
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 0.82rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cat-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* COUNT */
  .count { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }

  /* SECTION */
  .section { margin-bottom: 2.5rem; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }

  .cmd-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.2s, transform 0.15s;
  }

  .cmd-card:hover {
    border-color: rgba(88,101,242,0.35);
    transform: translateY(-1px);
  }

  .cmd-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
  }

  .cmd-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    font-family: 'DM Mono', 'Fira Code', monospace;
  }

  .cmd-desc {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }

  .empty {
    text-align: center;
    padding: 4rem 0;
    color: var(--muted);
    font-size: 1rem;
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

  @media (max-width: 600px) {
    nav { padding: 1rem; }
    .header { padding: 2.5rem 1rem 1.5rem; }
    .container { padding: 0 1rem 3rem; }
    .cmd-grid { grid-template-columns: 1fr; }
  }
</style>

const catKeys = Object.keys(CATS);
let activecat = "all";

function buildCats() {
  const el = document.getElementById("cats");
  let html = `<button class="cat-btn active" onclick="setcat('all',this)">Todos</button>`;
  catKeys.forEach(k => {
    const c = CATS[k];
    html += `<button class="cat-btn" onclick="setcat('${k}',this)">${c.emoji} ${k}</button>`;
  });
  el.innerHTML = html;
}

function setcat(cat, btn) {
  activecat = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const out = document.getElementById("output");
  const cntEl = document.getElementById("count");
  let total = 0;
  let html = "";

  const catsToShow = activecat === "all" ? catKeys : [activecat];

  catsToShow.forEach(k => {
    const c = CATS[k];
    const filtered = c.cmds.filter(([name, desc]) =>
      name.includes(q) || desc.toLowerCase().includes(q)
    );
    if (!filtered.length) return;
    total += filtered.length;

    html += `<div class="section">
      <div class="section-title">${c.emoji}&nbsp; ${k}</div>
      <div class="cmd-grid">`;
    filtered.forEach(([name, desc]) => {
      html += `<div class="cmd-card">
        <div class="cmd-icon" style="background:${c.bg};color:${c.color}">${c.emoji}</div>
        <div>
          <div class="cmd-name">!${name}</div>
          <div class="cmd-desc">${desc}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  if (!total) {
    html = `<div class="empty"><div class="empty-icon">🔍</div>No se encontraron comandos para "<strong>${q}</strong>"</div>`;
  }

  cntEl.textContent = total + " comando" + (total !== 1 ? "s" : "");
  out.innerHTML = html;
}

buildCats();
render();
</script>
