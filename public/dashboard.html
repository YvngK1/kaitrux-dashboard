<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard - Select Server</title>
    <style>
        /* Estilos Base estilo Discord Dark */
        body {
            background-color: #36393f;
            color: #dcddde;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            background-color: #2f3136;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .navbar a {
            color: #b9bbbe;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }
        
        .navbar a:hover {
            color: #fff;
        }

        /* Selector de Idioma (Arriba a la Derecha) */
        .lang-container {
            position: absolute;
            top: 12px;
            right: 20px;
            z-index: 1000;
        }

        #lang-select {
            background-color: #202225;
            color: #ffffff;
            border: 1px solid #4f545c;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            font-size: 14px;
        }

        #lang-select:hover {
            border-color: #5865f2;
        }

        /* Contenedor Principal */
        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .header-section {
            margin-bottom: 40px;
        }

        .header-section h1 {
            color: #fff;
            margin-bottom: 10px;
        }

        /* Rejilla de Servidores */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        /* Tarjeta de Servidor */
        .server-card {
            background-color: #2f3136;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .server-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .server-icon {
            width: 80px;
            height: 80px;
            background-color: #40444b;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            font-weight: bold;
            background-size: cover;
            background-position: center;
        }

        .server-name {
            color: #fff;
            font-size: 18px;
            margin: 10px 0 20px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Botones de Acción */
        .btn-action {
            display: block;
            width: 100%;
            padding: 10px 0;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s;
            box-sizing: border-box;
        }

        .btn-manage {
            background-color: #43b581;
            color: white;
        }

        .btn-manage:hover {
            background-color: #3ca374;
        }

        .btn-invite {
            background-color: #4f545c;
            color: #b9bbbe;
        }

        .btn-invite:hover {
            background-color: #72767d;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- Barra de Navegación Superior -->
    <nav class="navbar">
        <a href="/" data-i18n="nav-home">Inicio</a>
        <a href="/dashboard" data-i18n="nav-dashboard" style="color: #fff;">Panel</a>
        <a href="/status" data-i18n="nav-status">Estado</a>
        <a href="/commands" data-i18n="nav-commands">Comandos</a>
    </nav>

    <!-- Contenedor del Selector de Idioma -->
    <div class="lang-container">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
        </select>
    </div>

    <!-- Contenido Principal -->
    <div class="container">
        <div class="header-section">
            <h1 data-i18n="dash-title">Tus Servidores</h1>
            <p data-i18n="dash-subtitle">Selecciona un servidor para configurar el bot.</p>
        </div>

        <!-- Lista de Servidores (Ejemplos estáticos que reemplazará tu Backend) -->
        <div class="server-grid">
            
            <!-- Servidor donde el bot YA está presente -->
            <div class="server-card">
                <div class="server-icon" style="background-color: #5865f2;">GS</div>
                <div class="server-name">Gaming Server</div>
                <a href="/server?id=1122334455" class="btn-action btn-manage" data-i18n="dash-btn-manage">Configurar</a>
            </div>

            <!-- Servidor donde falta invitar al bot -->
            <div class="server-card">
                <div class="server-icon" style="background-color: #747f8d;">TS</div>
                <div class="server-name">Test Server</div>
                <a href="https://discord.com/api/oauth2/authorize?client_id=TU_BOT_ID&permissions=8&scope=bot" target="_blank" class="btn-action btn-invite" data-i18n="dash-btn-invite">Invitar Bot</a>
            </div>

        </div>
    </div>

    <!-- Script del Motor de Traducción -->
    <script src="/js/translate.js"></script>

    <!-- ⚠️ NOTA: Si tenías un script propio acá abajo para cargar los servidores reales desde tu API de Express con fetch(), NO LO BORRES, dejalo acá abajo intacto. -->

</body>
</html>
