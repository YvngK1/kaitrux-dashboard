<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Servers</title>
    <style>
        body { background-color: #36393f; color: #dcddde; font-family: sans-serif; margin: 0; padding: 0; }
        .navbar { background-color: #2f3136; padding: 15px 30px; display: flex; gap: 20px; align-items: center; }
        .navbar a { color: #fff; text-decoration: none; font-weight: bold; }
        .lang-container { position: absolute; top: 12px; right: 20px; }
        #lang-select { background-color: #202225; color: white; border: 1px solid #4f545c; padding: 6px; border-radius: 4px; cursor: pointer; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1max)); gap: 20px; margin-top: 20px; }
        .server-card { background-color: #2f3136; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-action { display: block; width: 100%; padding: 10px 0; border: none; border-radius: 4px; font-weight: bold; text-decoration: none; text-align: center; margin-top: 15px; color: white; cursor: pointer; }
        .btn-manage { background-color: #43b581; }
        .btn-invite { background-color: #747f8d; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" data-i18n="nav-home">Inicio</a>
        <a href="/dashboard" data-i18n="nav-dashboard">Panel</a>
        <a href="/status" data-i18n="nav-status">Estado</a>
    </nav>
    <div class="lang-container">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
        </select>
    </div>
    <div class="container">
        <h1 data-i18n="dash-title">Tus Servidores</h1>
        <p data-i18n="dash-subtitle">Selecciona un servidor para configurar el bot.</p>
        <div class="server-grid">
            <div class="server-card">
                <h3 style="color:#fff;">Ejemplo Server</h3>
                <a href="/server?id=123" class="btn-action btn-manage" data-i18n="dash-btn-manage">Configurar</a>
            </div>
        </div>
    </div>
    <script src="/js/translate.js"></script>
</body>
</html>
